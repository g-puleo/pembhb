batch_size: 250
epochs: 500
learning_rate: 0.0001
precision: "float32"  # "float32" (default) or "float64"
#transform_td: "normalise_max" # options: "none", "logwhiten", "log", "whiten"
transform_fd: "log" # options: "none", "logwhiten", "log", "whiten", "normalise_max"
noise_factor: 1.0
early_stop_patience: 75
early_stop_min_delta: 0.001
early_stop_threshold: 0.999
scheduler_factor: 0.3
scheduler_patience: 50
keep_ckpt: True
marginals:
  #  f: [[0]]
  f: [[0,],[7,8], [10]]

# -------------------------------------------------------------------------
# Marginal schedule (optional)
# Train on different marginal sets depending on the round index.
# Each entry has "from_round" (inclusive) and the "marginals" dict to use.
# Entries are evaluated in order; the LAST matching entry wins.
# If omitted or empty, "marginals" above is used for all rounds.
# -------------------------------------------------------------------------
marginal_schedule:
  - from_round: 1
    marginals:
      f: [[0,], [10,]]
  - from_round: 3
    marginals:
      f: [[0,], [10,], [7, 8]]

periodic_bc_params: [ 7, ]
device: "cuda"


architecture:
  gradnorm:
    enabled: False
    alpha: 1
    learning_rate: 0.0005
    common_params: "linear_f"


  data_summary:

    type: "Autoencoder"  # Options: "ROM", "Autoencoder"
    BrutalCompression:
      Nfreqs: 1000
      lowdim: 16
      in_channels: 4

    PeregrineModel:
      n_channels: 2 # number of channels used (AE--> 2, AET-->3)
      n_timesteps: 6048
      n_freqs: 4096
      # Nfreqs: 100
      # lowdim: 16
      # in_channels: 6
      # cnn_channels: [32, 64]
    ROM:
      load: False
      max_basis_elements: 50
      filename: "/u/g/gpuleo/pembhb/rom_td_fd.pt"
      device: "cuda"
      batch_train: 1000
      patience: 25
      freq_split_idx: 2048
      high_freq_only: True
    Autoencoder:
      load: False
      finetune_previous: True 
      filename: "/data/gpuleo/mbhb/logs/autoencoder/version_12/checkpoints/ae-epoch=261-val_loss=5.7389e-09.ckpt"  # Path to trained DenoisingAutoencoder checkpoint
      device: "cuda"
      # --- Training hyperparameters (used when load: False) ---
      architecture: "conv"        # "conv" or "unet"
      representation: "real_imag"  # "amp_phase" or "real_imag"
      n_channels: 2                # TDI channels (AE→2, AET→3)
      n_freqs: 4096
      bottleneck_dim: 256
      # input_channels is 4, hidden_channels determines the progressive increase in the channel dimension
      hidden_channels: [3, 5, 11, 24, 53, 116, 256]
      kernel_size: 7
      stride: 3 # determines downsampling along the frequency dimension (start from 4096=2^12)
      dropout: 0.0
      high_freq_only: False
      freq_split_idx: 2048
      # Training
      lr: 0.001
      weight_decay: 0.00001
      epochs: 200
      scheduler_patience: 30
      scheduler_factor: 0.3
      early_stop_patience: 60
      gradient_clip_val: null
      log_name: "autoencoder"
  
baseline_model:
  use: False
  #filename: "/data/gpuleo/mbhb/logs/20251205_100028_round_0/version_0/checkpoints/epoch=474-step=133000.ckpt"
  filename: "/data/gpuleo/mbhb/logs/20260205withsky_v1_round_0/version_7/checkpoints/epoch=475-step=66640.ckpt"

# -------------------------------------------------------------------------
# Joint AE + NRE training  (used by scripts/tmnre_joint.py)
# These settings are IGNORED by scripts/tmnre.py (sequential pipeline).
# -------------------------------------------------------------------------
joint_training:
  ae_warmup_epochs: 50        # epochs of AE-only training before NRE kicks in (round 1 only)
  lr_ae: 0.001                # learning rate for autoencoder (encoder + decoder)
  lr_nre: 0.0001              # learning rate for NRE classifier heads
  ae_weight_decay: 0.00001    # weight decay for autoencoder param group
  ae_scheduler_patience: 50   # ReduceLROnPlateau patience
  ae_scheduler_factor: 0.3    # ReduceLROnPlateau factor


rom_use_pinned_memory: false  # Only set true for single-session usage
rom_prefetch_batches: 4       # Increase to reduce Python overhead

# -------------------------------------------------------------------------
# Fisher-matrix prior initialisation for round 1
# When enabled: true the prior for the first round of data generation is
# computed automatically from the Fisher Information Matrix evaluated at the
# true parameters of the target event.  Set enabled: false to fall back to
# the bounds in datagen_config.yaml.
# -------------------------------------------------------------------------
fisher_prior:
  enabled: false
  event_idx: 0           # which event in the HDF5 file to use as expansion point
  varying_params:        # FIM-based bounds are computed for these parameters
    - "logMchirp"
    - "q"
    - "lambda"
    - "beta"
    - "Deltat"
  fixed_params:          # these parameters are pinned to the value read from the observation file
    - "chi1"
    - "chi2"
    - "dist"
    - "phi"
    - "inc"
    - "psi"
  n_sigma: 25.0           # prior half-width in units of FIM sigma
  delta_frac: 1.0e-4     # fractional step size for numerical derivatives